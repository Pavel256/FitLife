name: PlantUML Diagrams

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  generate-diagrams:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Запуск генерации через официальный Docker-контейнер PlantUML
    - name: Generate Diagrams
      run: |
        echo "Ищем файлы диаграмм в проекте..."
        # Находим все папки, где лежат файлы .puml
        FOLDERS=$(find . -name "*.puml" -exec dirname {} \; | sort -u)
        
        if [ -n "$FOLDERS" ]; then
          echo "Диаграммы найдены. Запуск официального Docker PlantUML..."
          # Запускаем контейнер, монтируем текущую папку проекта и рендерим картинки
          docker run --rm -v $(pwd):/data plantuml/plantuml -v -tpng "**/*.puml"
        else
          echo "Файлы .puml не найдены в репозитории."
        fi

    # Надежный коммит сгенерированных картинок
    - name: Commit Diagrams
      run: |
        git config --local user.email "github-actions[bot]@://github.com"
        git config --local user.name "github-actions[bot]"
        
        PNG_FILES=$(find . -name "*.png" -o -name "*.PNG")
        
        if [ -n "$PNG_FILES" ]; then
          echo "Найдены картинки .png. Добавляем в Git..."
          echo "$PNG_FILES" | xargs git add
          
          if git diff --staged --quiet; then
            echo "Нет новых изменений в диаграммах для коммита."
          else
            git commit -m "Automated diagram generation [skip ci]"
            git push origin main
          fi
        else
          echo "Новые картинки не были сгенерированы."
        fi
