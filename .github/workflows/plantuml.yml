name: PlantUML Diagrams

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  generate-diagrams:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install GraphViz
      run: |
        sudo apt-get update
        sudo apt-get install -y graphviz

    - name: Download PlantUML
      run: curl -L -o plantuml.jar https://github.com

    # Надежная генерация через команду find (найдет файлы на любой глубине папок)
    - name: Generate Diagrams
      run: |
        echo "Ищем файлы диаграмм в проекте..."
        FILES=$(find . -name "*.puml" -o -name "*.PUML")
        
        if [ -n "$FILES" ]; then
          echo "Найдены файлы диаграмм. Запуск генерации..."
          # Запускаем генерацию конкретно для каждого найденного файла
          echo "$FILES" | xargs java -jar plantuml.jar -v -tpng
        else
          echo "Файлы .puml не найдены в репозитории."
        fi

    # Надежный коммит сгенерированных картинок
    - name: Commit Diagrams
      run: |
        git config --local user.email "github-actions[bot]@://github.com"
        git config --local user.name "github-actions[bot]"
        
        rm -f plantuml.jar
        
        # Ищем все сгенерированные файлы картинок через find
        PNG_FILES=$(find . -name "*.png" -o -name "*.PNG")
        
        if [ -n "$PNG_FILES" ]; then
          echo "Найдены картинки .png. Добавляем в Git..."
          echo "$PNG_FILES" | xargs git add
          
          if git diff --staged --quiet; then
            echo "Нет новых изменений в диаграммах для коммита."
          else
            git commit -m "Automated diagram generation [skip ci]"
            git push origin main
          fi
        else
          echo "Новые картинки не были сгенерированы."
        fi