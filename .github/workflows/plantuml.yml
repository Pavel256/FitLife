name: PlantUML Diagrams

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  generate-diagrams:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install GraphViz
      run: |
        sudo apt-get update
        sudo apt-get install -y graphviz

    - name: Download PlantUML
      run: curl -L -o plantuml.jar https://github.com

    # Умная генерация: проверяем файлы перед запуском Java
    - name: Generate Diagrams
      run: |
        # Ищем файлы .puml, которые содержат хоть какой-то текст
        if grep -q "@startuml" **/*.puml 2>/dev/null; then
          echo "Найдены валидные файлы диаграмм. Запуск генерации..."
          java -jar plantuml.jar -v -tpng "**/*.puml"
        else
          echo "Валидные файлы .puml не найдены или они пустые. Пропускаем генерацию."
        fi

    - name: Commit Diagrams
      run: |
        git config --local user.email "github-actions[bot]@://github.com"
        git config --local user.name "github-actions[bot]"
        
        rm -f plantuml.jar
        git add "**/*.png"
        
        if git diff --staged --quiet; then
          echo "Нет новых изменений в диаграммах для коммита."
        else
          git commit -m "Automated diagram generation [skip ci]"
          git push origin main
        fi
